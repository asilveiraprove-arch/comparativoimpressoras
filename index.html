<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Comparador Técnico de Impressoras</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 20px; background: #f9f9f9; }
        #menu-flutuante {
            position: sticky; top: 0; background: #fff; padding: 20px;
            border-bottom: 3px solid #007bff; z-index: 100;
            display: flex; gap: 20px; align-items: center; justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #dee2e6; padding: 12px; text-align: center; }
        th { background-color: #007bff; color: white; }
        .label { font-weight: bold; text-align: left; background: #f4f4f4; }
    </style>
</head>
<body>

<div id="menu-flutuante">
    <strong>Selecione para comparar:</strong>
    <select id="sel1" onchange="comparar()"><option value="">Modelo 1</option></select>
    <select id="sel2" onchange="comparar()"><option value="">Modelo 2</option></select>
</div>

<table id="tabela">
    <thead>
        <tr><th>Especificação</th><th id="nome1"> - </th><th id="nome2"> - </th></tr>
    </thead>
    <tbody id="corpo-tabela"></tbody>
</table>

<script src="dados_impressoras.js"></script>
<script>
    // 1. Popula os selects com os modelos vindos do arquivo externo
    const selects = [document.getElementById('sel1'), document.getElementById('sel2')];
    Object.keys(bancoDadosImpressoras).forEach(modelo => {
        selects.forEach(s => s.add(new Option(modelo, modelo)));
    });

    // 2. Função de comparação corrigida
    function comparar() {
        const val1 = document.getElementById('sel1').value;
        const val2 = document.getElementById('sel2').value;
        const m1 = bancoDadosImpressoras[val1];
        const m2 = bancoDadosImpressoras[val2];

        document.getElementById('nome1').innerText = val1 || "Modelo 1";
        document.getElementById('nome2').innerText = val2 || "Modelo 2";
        
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        
        const campos = [
            {id: 'tipo', nome: 'Tipo'}, {id: 'tecnologia', nome: 'Tecnologia'},
            {id: 'cor', nome: 'Cor'}, {id: 'vel_imp', nome: 'Velocidade Impressão'},
            {id: 'resolução', nome: 'Resolução'}, 
            {id: 'vel_dig', nome: 'Velocidade Digitalização'}, {id: 'duplex_imp', nome: 'Frente e Verso Impressão'},
            {id: 'duplex_dig', nome: 'Frente e Verso Digitalização'}, {id: 'conexão', nome: 'Conexão'},
            {id: 'gramatura', nome: 'Gramatura Máxima'}, {id: 'formato', nome: 'Formato'}

        ];

        campos.forEach(c => {
            const v1 = (m1 && m1[c.id] !== undefined) ? m1[c.id] : '-';
            const v2 = (m2 && m2[c.id] !== undefined) ? m2[c.id] : '-';
            corpo.innerHTML += `<tr><td class="label">${c.nome}</td><td>${v1}</td><td>${v2}</td></tr>`;
        });
    }
</script>
</body>
</html>
